<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Expansión - Trinkwasser</title>

  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="componentes.css">
  <link rel="stylesheet" href="pages.css">
</head>

<body>

<section class="section">
  <h2>Solicitud de nueva zona</h2>

  <form id="expansionForm">

    <label>Nombre</label>
    <input type="text" id="nombre" required>

    <label>Dirección</label>
    <input type="text" id="direccion" required>

    <label>Consumo estimado (garrafones por semana)</label>
    <input type="number" id="consumo" required>

    <label>Frecuencia</label>
    <select id="frecuencia">
      <option>Semanal</option>
      <option>Quincenal</option>
    </select>

    <button type="submit" class="btn-pedido">
      Enviar solicitud
    </button>

  </form>
</section>

<script src="scripts/expansion.js"></script>

</body>
</html>
