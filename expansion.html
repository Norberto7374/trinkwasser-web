<!DOCTYPE html>

  <meta charset="UTF-8">

 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<header class="header">
  <img src="img/banner.webp" class="banner">
</header>  

  
<body class="pedido-page">
  
<section class="section">
  <h2>Solicitud de nueva zona</h2>

  <form class="pedido-form" id="expansionForm">

    <label>Nombre</label>
    <input type="text" id="nombre" required>

    <label>Código Postal</label>
    <input type="text" id="cp" readonly>
    
    <label>Dirección</label>
    <input type="text" id="direccion" required>

    <label>Consumo estimado (garrafones por semana)</label>
    <input type="number" id="consumo" required>

    <label>Frecuencia</label>
    <select id="frecuencia">
      <option>Semanal</option>
      <option>Quincenal</option>
    </select>

    <button type="submit" class="btn-pedido">
      Enviar solicitud
    </button>

  </form>
</section>
