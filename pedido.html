<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realizar Pedido - Trinkwasser</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pedido.css">
</head>

<body>

<header class="header">
  <img src="img/banner.webp" alt="Trinkwasser" class="logo">
</header>

<section class="section">
  <h2>Realiza tu Pedido</h2>

  <form class="pedido-form" id="pedidoForm">

    <label>Nombre</label>
    <input type="text" id="nombre" required>

    <label>Dirección</label>
    <input type="text" id="direccion" required>

    <label>Producto</label>
    <select id="producto">
      <option>Garrafón 20L</option>
      <option>Garrafón 10L</option>
    </select>

    <label>Cantidad</label>
    <input type="number" id="cantidad" required>

    <label>¿Cuenta con garrafones?</label>
    <select id="garrafones">
      <option>Propios</option>
      <option>Préstamo</option>
      <option>Compra</option>
    </select>

    <label>Tipo de garrafón</label>
    <select id="tipo">
      <option>Epura</option>
      <option>Ciel</option>
      <option>Bonafont</option>
      <option>Genérico</option>
    </select>

    <label>Horario de entrega</label>
    <select id="horario">
      <option>Mañana</option>
      <option>Tarde</option>
    </select>

    <label>Forma de pago</label>
    <select id="pago">
      <option>Efectivo</option>
      <option>Transferencia</option>
    </select>

    <button type="submit" class="btn-pedido">Enviar por WhatsApp</button>

  </form>
</section>

<script src="scripts/pedido.js"></script>

</body>
</html>
