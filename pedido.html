<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realizar Pedido - Trinkwasser</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="componentes.css">
  <link rel="stylesheet" href="pages.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="pedido-page">

<header class="header">
  <img src="img/banner.webp" alt="Trinkwasser" class="banner">
</header>

<section class="section">
  <h2>Realiza tu Pedido</h2>

  <form class="pedido-form" id="pedidoForm">

    <label>Nombre</label>
    <input type="text" id="nombre" required>

    <label>Dirección</label>
    <input type="text" id="direccion" required>

<div id="productos-container">
</div>
    
<button type="button" id="agregar-producto" class="btn-secundario">
  ➕ Agregar otro producto
</button>

    <label>Horario de entrega</label>
    <select id="horario">
      <option>Mañana</option>
      <option>Tarde</option>
    </select>

    <label>Forma de pago</label>
    <select id="pago">
      <option>Efectivo</option>
      <option>Transferencia</option>
    </select>

    <button type="submit" class="btn-pedido">
  💬 Enviar por WhatsApp
    </button>

  </form>
</section>

</html>
